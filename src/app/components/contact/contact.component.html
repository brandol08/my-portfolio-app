<div class="contact-container">
    <h2>Contact Me</h2>
    <form>
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>
        </div>
        <button type="submit">Send Message</button>
    </form>
    <div class="social-links">
        <h3>Connect with me:</h3>
        <ul>
            <li><a href="https://github.com/alejoariasmarlon80" target="_blank">GitHub</a></li>
            <li><a href="https://www.linkedin.com/in/alejoarias" target="_blank">LinkedIn</a></li>
            <li><a href="https://twitter.com/alejoarias" target="_blank">Twitter</a></li>
        </ul>
    </div>
</div>
